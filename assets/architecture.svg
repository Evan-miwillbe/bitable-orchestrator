<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" rx="12" fill="url(#abg)"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Bitable Orchestrator 技术架构</text>

  <!-- Layer 1: User Input -->
  <g filter="url(#sh)">
    <rect x="280" y="50" width="300" height="48" rx="24" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="430" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">自然语言描述业务规则</text>
  </g>
  <path d="M430,98 L430,125" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 2: Core Engine (4 modules) -->
  <g filter="url(#sh)">
    <rect x="40" y="125" width="780" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="430" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">核心引擎</text>
  </g>

  <!-- Module: Intent Parser -->
  <rect x="60" y="160" width="170" height="76" rx="8" fill="#3b82f6"/>
  <text x="145" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Intent Parser</text>
  <text x="145" y="203" text-anchor="middle" font-size="11" fill="#dbeafe">意图解析器</text>
  <text x="145" y="223" text-anchor="middle" font-size="10" fill="#bfdbfe">环境感知 / 歧义消解</text>

  <!-- Module: Plan Generator -->
  <rect x="250" y="160" width="170" height="76" rx="8" fill="#8b5cf6"/>
  <text x="335" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Plan Generator</text>
  <text x="335" y="203" text-anchor="middle" font-size="11" fill="#ede9fe">计划生成器</text>
  <text x="335" y="223" text-anchor="middle" font-size="10" fill="#ddd6fe">原子操作 / 依赖图</text>

  <!-- Module: Dry-Run Engine -->
  <rect x="440" y="160" width="170" height="76" rx="8" fill="#f59e0b"/>
  <text x="525" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Dry-Run Engine</text>
  <text x="525" y="203" text-anchor="middle" font-size="11" fill="#fef3c7">模拟验证器</text>
  <text x="525" y="223" text-anchor="middle" font-size="10" fill="#fde68a">冲突检测 / 预测结果</text>

  <!-- Module: Execute Engine -->
  <rect x="630" y="160" width="170" height="76" rx="8" fill="#10b981"/>
  <text x="715" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Execute Engine</text>
  <text x="715" y="203" text-anchor="middle" font-size="11" fill="#d1fae5">执行引擎</text>
  <text x="715" y="223" text-anchor="middle" font-size="10" fill="#a7f3d0">逐步执行 / 错误恢复</text>

  <!-- Arrows between modules -->
  <path d="M230,198 L250,198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M420,198 L440,198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M610,198 L630,198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 3: Safety Layer -->
  <g filter="url(#sh)">
    <rect x="40" y="275" width="780" height="60" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="100" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Safety Layer</text>
    <text x="260" y="310" text-anchor="middle" font-size="12" fill="#991b1b">快照保护</text>
    <text x="400" y="310" text-anchor="middle" font-size="12" fill="#991b1b">原子回滚</text>
    <text x="540" y="310" text-anchor="middle" font-size="12" fill="#991b1b">API 限频</text>
    <text x="690" y="310" text-anchor="middle" font-size="12" fill="#991b1b">敏感字段脱敏</text>

    <!-- Dividers -->
    <line x1="180" y1="285" x2="180" y2="327" stroke="#fca5a5" stroke-width="1"/>
    <line x1="330" y1="285" x2="330" y2="327" stroke="#fca5a5" stroke-width="1"/>
    <line x1="470" y1="285" x2="470" y2="327" stroke="#fca5a5" stroke-width="1"/>
    <line x1="610" y1="285" x2="610" y2="327" stroke="#fca5a5" stroke-width="1"/>
  </g>

  <path d="M430,255 L430,275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 4: Feishu CLI Layer -->
  <g filter="url(#sh)">
    <rect x="40" y="355" width="780" height="55" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="100" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Feishu CLI</text>
    <text x="270" y="388" text-anchor="middle" font-size="12" fill="#15803d">lark-base</text>
    <text x="390" y="388" text-anchor="middle" font-size="12" fill="#15803d">lark-im</text>
    <text x="510" y="388" text-anchor="middle" font-size="12" fill="#15803d">lark-task</text>
    <text x="640" y="388" text-anchor="middle" font-size="12" fill="#15803d">lark-doc</text>
    <text x="760" y="388" text-anchor="middle" font-size="12" fill="#15803d">lark-sheets</text>

    <!-- Dividers -->
    <line x1="180" y1="365" x2="180" y2="402" stroke="#86efac" stroke-width="1"/>
    <line x1="330" y1="365" x2="330" y2="402" stroke="#86efac" stroke-width="1"/>
    <line x1="450" y1="365" x2="450" y2="402" stroke="#86efac" stroke-width="1"/>
    <line x1="570" y1="365" x2="570" y2="402" stroke="#86efac" stroke-width="1"/>
    <line x1="700" y1="365" x2="700" y2="402" stroke="#86efac" stroke-width="1"/>
  </g>

  <path d="M430,335 L430,355" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Bottom: Supporting modules -->
  <g filter="url(#sh)">
    <rect x="60" y="440" width="220" height="55" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="170" y="463" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">Template Library</text>
    <text x="170" y="482" text-anchor="middle" font-size="11" fill="#7c3aed">模式学习 / 模板复用</text>
  </g>
  <g filter="url(#sh)">
    <rect x="320" y="440" width="220" height="55" rx="8" fill="#fff" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="430" y="463" text-anchor="middle" font-size="12" font-weight="600" fill="#a16207">Audit Logger</text>
    <text x="430" y="482" text-anchor="middle" font-size="11" fill="#b45309">完整操作审计链</text>
  </g>
  <g filter="url(#sh)">
    <rect x="580" y="440" width="220" height="55" rx="8" fill="#fff" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="690" y="463" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">Schedule Engine</text>
    <text x="690" y="482" text-anchor="middle" font-size="11" fill="#059669">定时编排 / Cron任务</text>
  </g>

  <!-- Connecting lines from CLI layer to bottom modules -->
  <path d="M170,410 L170,440" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M430,410 L430,440" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M690,410 L690,440" stroke="#6ee7b7" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
